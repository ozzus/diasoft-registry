openapi: 3.0.3
info:
  title: Diasoft Registry Internal API
  version: 1.0.0
  description: Internal source-of-truth API for universities, students, imports, and diploma lifecycle operations.
servers:
  - url: http://localhost:8081
    description: Local development
  - url: https://registry.example.com
    description: Internal runtime
security:
  - bearerAuth: []
tags:
  - name: auth
  - name: universities
  - name: imports
  - name: university
  - name: student
paths:
  /api/v1/ping:
    get:
      tags: [auth]
      summary: Ping the registry service
      operationId: pingRegistry
      responses:
        '200':
          description: Registry is alive
  /api/v1/me:
    get:
      tags: [auth]
      summary: Get current scoped user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
  /api/v1/universities:
    get:
      tags: [universities]
      summary: List universities visible to the current operator
      operationId: listUniversities
      responses:
        '200':
          description: University list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/University'
  /api/v1/universities/{id}/imports:
    get:
      tags: [imports]
      summary: List import jobs for a university
      operationId: listImportJobs
      parameters:
        - $ref: '#/components/parameters/UniversityId'
      responses:
        '200':
          description: Import jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImportJob'
    post:
      tags: [imports]
      summary: Create an import job
      operationId: createImportJob
      parameters:
        - $ref: '#/components/parameters/UniversityId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Accepted import
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
  /api/v1/imports/{id}:
    get:
      tags: [imports]
      summary: Get import job
      operationId: getImportJob
      parameters:
        - $ref: '#/components/parameters/ImportId'
      responses:
        '200':
          description: Import job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
  /api/v1/imports/{id}/errors:
    get:
      tags: [imports]
      summary: Get import row errors
      operationId: getImportErrors
      parameters:
        - $ref: '#/components/parameters/ImportId'
      responses:
        '200':
          description: Import errors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImportJobError'
  /api/v1/university/diplomas:
    get:
      tags: [university]
      summary: List diplomas visible to the current university-scoped operator
      operationId: listUniversityDiplomas
      responses:
        '200':
          description: Diploma list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Diploma'
  /api/v1/university/diplomas/{id}:
    get:
      tags: [university]
      summary: Get a university-scoped diploma
      operationId: getUniversityDiploma
      parameters:
        - $ref: '#/components/parameters/DiplomaId'
      responses:
        '200':
          description: Diploma detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Diploma'
  /api/v1/university/diplomas/{id}/revoke:
    post:
      tags: [university]
      summary: Revoke a diploma
      operationId: revokeDiploma
      parameters:
        - $ref: '#/components/parameters/DiplomaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRequest'
      responses:
        '200':
          description: Revoked diploma
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Diploma'
  /api/v1/student/diplomas:
    get:
      tags: [student]
      summary: List diplomas for the current student scope
      operationId: listStudentDiplomas
      responses:
        '200':
          description: Student diploma list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Diploma'
  /api/v1/student/diplomas/{id}:
    get:
      tags: [student]
      summary: Get a student-scoped diploma
      operationId: getStudentDiploma
      parameters:
        - $ref: '#/components/parameters/DiplomaId'
      responses:
        '200':
          description: Diploma detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Diploma'
  /api/v1/student/diplomas/{id}/share-links:
    post:
      tags: [student]
      summary: Create a share link for the current student scope
      operationId: createShareLink
      parameters:
        - $ref: '#/components/parameters/DiplomaId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareLinkRequest'
      responses:
        '200':
          description: Share link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareLink'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UniversityId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ImportId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    DiplomaId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CurrentUser:
      type: object
      required: [subject, roles]
      properties:
        subject:
          type: string
        roles:
          type: array
          items:
            type: string
        universityId:
          type: string
          format: uuid
          nullable: true
        studentExternalId:
          type: string
          nullable: true
    University:
      type: object
      required: [id, code, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    ImportJob:
      type: object
      required: [id, universityId, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        universityId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, partially_failed, failed]
        totalRows:
          type: integer
        successRows:
          type: integer
        failedRows:
          type: integer
        sourceObjectKey:
          type: string
        createdAt:
          type: string
          format: date-time
    ImportJobError:
      type: object
      required: [rowNumber, errorCode, message]
      properties:
        rowNumber:
          type: integer
        errorCode:
          type: string
        message:
          type: string
    Diploma:
      type: object
      required: [id, universityId, universityCode, diplomaNumber, verdict, studentName]
      properties:
        id:
          type: string
          format: uuid
        universityId:
          type: string
          format: uuid
        universityCode:
          type: string
        diplomaNumber:
          type: string
        studentName:
          type: string
        program:
          type: string
        issuedAt:
          type: string
          format: date
        verdict:
          type: string
          enum: [valid, revoked]
    RevokeRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
    ShareLinkRequest:
      type: object
      properties:
        ttlHours:
          type: integer
          minimum: 1
    ShareLink:
      type: object
      required: [id, token, diplomaId, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
        diplomaId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
